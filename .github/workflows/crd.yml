name: Windows-CRD
on:
  workflow_dispatch:

jobs:
  crd:
    runs-on: windows-latest
    env:
      CRD_AUTH_CODE: ${{ secrets.CRD_AUTH_CODE }}
      CRD_PIN: ${{ secrets.CRD_PIN }}

    steps:
      - name: Install Google Chrome
        shell: powershell
        run: |
          Write-Host "Downloading Chrome..."
          Invoke-WebRequest `
            -Uri "https://dl.google.com/tag/s/appguid%3D%7B8A69D345-D564-463C-AFF1-A69D9E530F96%7D&brand=GCEU&platform=win&installdataindex=default/chrome/install/GoogleChromeStandaloneEnterprise64.msi" `
            -OutFile "GoogleChromeStandaloneEnterprise64.msi"

          Write-Host "Installing Chrome..."
          Start-Process "msiexec.exe" -ArgumentList "/i GoogleChromeStandaloneEnterprise64.msi /qn" -Wait

      - name: Install Chrome Remote Desktop Host
        shell: powershell
        run: |
          Write-Host "Downloading CRD Host..."
          Invoke-WebRequest `
            -Uri "https://dl.google.com/tag/s/appguid%3D%7B4F799C5F-5C0C-4B82-BC3F-8AC51BB3B1D4%7D&brand=GCEU&platform=win&installdataindex=default/chrome-remote-desktop-host.msi" `
            -OutFile "chrome-remote-desktop-host.msi"

          Write-Host "Installing CRD Host..."
          Start-Process "msiexec.exe" -ArgumentList "/i chrome-remote-desktop-host.msi /qn" -Wait

      - name: Start Chrome Remote Desktop Host
        shell: powershell
        run: |
          $AuthCode = "${{ secrets.CRD_AUTH_CODE }}"
          $Pin = "${{ secrets.CRD_PIN }}"
          $CRDPath = "${env:ProgramFiles(x86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"

          Write-Host "Starting Chrome Remote Desktop Host..."
          Start-Process $CRDPath `
            -ArgumentList "--code=$AuthCode", "--redirect-url=https://remotedesktop.google.com/_/oauthredirect", "--name=GitHub-Windows", "--pin=$Pin" `
            -Wait

      - name: Keep Runner Alive
        shell: powershell
        run: |
          Write-Host "Keeping the session alive..."
          ping -t 127.0.0.1
