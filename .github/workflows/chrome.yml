name: Windows-CRD
on: workflow_dispatch

jobs:
  crd:
    runs-on: windows-latest

    env:
      CRD_AUTH_CODE: ${{ secrets.CRD_AUTH_CODE }}
      CRD_PIN: ${{ secrets.CRD_PIN }}

    steps:
      - name: Download Chrome Installer
        run: |
          curl -o chrome_installer.exe https://dl.google.com/chrome/install/latest/chrome_installer.exe

      - name: Install Chrome
        shell: powershell
        run: |
          Start-Process "chrome_installer.exe" -ArgumentList "/quiet", "/install" -Wait

      - name: Download CRD Host
        run: |
          curl -o crdhost.msi https://dl.google.com/chrome-remote-desktop/chrome-remote-desktop_current_amd64.msi

      - name: Install CRD Host
        shell: powershell
        run: |
          Start-Process "msiexec.exe" -ArgumentList "/i", "crdhost.msi", "/quiet", "/norestart" -Wait

      - name: Register Chrome Remote Desktop
        shell: powershell
        run: |
          $code = "${env:CRD_AUTH_CODE}"
          $pin = "${env:CRD_PIN}"

          $host = "C:\Program Files\Google\Chrome Remote Desktop\remoting_start_host.exe"

          Start-Process $host -ArgumentList "--code=$code", "--redirect-url=https://remotedesktop.google.com/_/oauthredirect", "--name=GitHub-Windows", "--pin=$pin" -Wait

      - name: Keep Alive
        run: ping -t 127.0.0.1
